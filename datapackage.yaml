name: projetos-acordo-judicial-reparacao-vale
title: Projetos do Acordo Judicial de Reparação da Vale
description: |
  ->
  Contém valores destinados aos projetos por meio do Acordo Judicial firmado com o objetivo de reparar
  os danos decorrentes do rompimento das barragens da Vale S.A. em Brumadinho.

  As alterações nos valores do Projetos ocorrem conforme deliberações do Conselho Superior do Comitê Gestor
  Pró-Brumadinho no uso das atribuições conferidas pelo [Decreto nº
  48.183/2021](https://www.almg.gov.br/consulte/legislacao/completa/completa.html?tipo=DEC&num=48183&comp=&ano=2021)
